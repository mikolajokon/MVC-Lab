{% extends "base.html" %}
{% block title %}Potwierdź usunięcie{% endblock %}
{% block content %}
<div class="card border-danger">
    <div class="card-body text-center">
        <h4>Czy na pewno chcesz usunąć?</h4>
        <p class="text-muted">{{ object }}</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Tak, usuń</button>
            <a href="{% url cancel_url %}" class="btn btn-secondary">Anuluj</a>
        </form>
    </div>
</div>
{% endblock %}
